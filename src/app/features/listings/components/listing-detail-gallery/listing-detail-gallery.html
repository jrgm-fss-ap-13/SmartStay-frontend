<div class="grid grid-cols-1 md:grid-cols-4 grid-rows-2 gap-3 h-[500px] rounded-3xl overflow-hidden mb-12">
    <div class="md:col-span-2 md:row-span-2 relative overflow-hidden group">
        <img [alt]="listing()?.title ?? 'Main property view'"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="galleryUrls()[0]" />
        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
    </div>
    <div class="relative overflow-hidden group">
        <img alt="Gallery image"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="galleryUrls()[1]" />
    </div>
    <div class="relative overflow-hidden group">
        <img alt="Gallery image"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="galleryUrls()[2]" />
    </div>
    <div class="relative overflow-hidden group">
        <img alt="Gallery image"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="galleryUrls()[3]" />
    </div>
    <div class="relative overflow-hidden group">
        <img alt="Gallery image"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            [src]="galleryUrls()[4]" />
        <button type="button"
            class="absolute bottom-6 right-6 bg-white px-4 py-2 rounded-lg border border-slate-300 text-sm font-bold shadow-lg flex items-center gap-2 hover:bg-slate-50 transition-colors">
            <span class="material-symbols-outlined text-lg">grid_view</span>
            Show all photos
        </button>
    </div>
</div>
