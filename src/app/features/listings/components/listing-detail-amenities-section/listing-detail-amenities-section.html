<div class="py-8 border-b border-slate-200">
    <h2 class="text-2xl font-bold mb-6">What this place offers</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        @for (amenity of listing()?.amenities ?? []; track amenity.id) {
        <div class="flex items-center gap-4 text-slate-700">
            <span class="material-symbols-outlined">check_circle</span>
            <div class="flex flex-col">
                <span>{{ amenity.name }}</span>
                <span class="text-xs text-slate-500">{{ amenity.category.display_name }}</span>
            </div>
        </div>
        }
    </div>
    <button type="button"
        class="mt-8 border border-slate-900 px-6 py-3 rounded-xl font-bold hover:bg-slate-50 transition-colors">
        Show all {{ (listing()?.amenities ?? []).length }} amenities
    </button>
</div>
