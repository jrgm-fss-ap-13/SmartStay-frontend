<div class="flex justify-between items-start pb-8 border-b border-slate-200">
    <div>
        <h2 class="text-2xl font-bold mb-1">{{ listing()?.property_type }} hosted by {{ listing()?.host_info?.full_name
            }}</h2>
        <p class="text-slate-600">{{ listing()?.max_guests }} guests · {{ listing()?.bedrooms }} bedrooms · {{
            listing()?.bathrooms }} baths</p>
        <p class="text-slate-500 text-sm mt-1">{{ listing()?.host_info?.months_hosting }} months hosting · {{
            listing()?.host_info?.profession }}</p>
    </div>
    <div class="relative">
        <img [alt]="listing()?.host_info?.full_name ?? 'Host'" class="w-14 h-14 rounded-full border-2 border-primary/20 object-cover"
            [src]="listing()?.host_info?.profile_image" />
        <div class="absolute -bottom-1 -right-1 bg-primary text-white p-0.5 rounded-full">
            <span class="material-symbols-outlined text-xs">verified</span>
        </div>
    </div>
</div>
