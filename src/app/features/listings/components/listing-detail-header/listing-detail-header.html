<div class="mb-6">
    <h1 class="text-3xl font-bold mb-2">{{ listing()?.title }}</h1>
    <div class="flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4 text-sm font-medium">
            <div class="flex items-center gap-1">
                <span class="material-symbols-outlined text-primary text-sm">star</span>
                <span>{{ listing()?.rating }}</span>
                <span class="text-slate-500 underline">{{ listing()?.total_reviews }} reviews</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">location_on</span>
                <span class="text-slate-500 underline">{{ listing()?.city }}, {{ listing()?.country }}</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="flex items-center gap-2 hover:bg-slate-100 px-3 py-2 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-lg">share</span>
                <span class="text-sm font-semibold underline">Share</span>
            </button>
            <button class="flex items-center gap-2 hover:bg-slate-100 px-3 py-2 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-lg">favorite_border</span>
                <span class="text-sm font-semibold underline">Save</span>
            </button>
        </div>
    </div>
</div>
