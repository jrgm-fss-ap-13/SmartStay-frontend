<form class="space-y-6">
  <div>
    <label class="block text-sm font-medium text-black mb-2" for="email">Email Address</label>
    <input class="w-full px-4 py-3 rounded-lg border border-[#d2dde5] bg-white text-black focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="e.g. name@example.com" type="email"/>
  </div>
  <div>
    <div class="flex justify-between items-center mb-2">
      <label class="block text-sm font-medium text-black" for="password">Password</label>
      <a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot password?</a>
    </div>
    <div class="relative">
      <input class="w-full px-4 py-3 rounded-lg border border-[#d2dde5] bg-white text-black focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="password" name="password" placeholder="Enter your password" type="password"/>
      <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" type="button">
        <span class="material-symbols-outlined">
          visibility
          </span>
      </button>
    </div>
  </div>
  <div class="flex items-center">
    <input class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
    <label class="ml-2 block text-sm text-black" for="remember-me">Remember me for 30 days</label>
  </div>
  <button class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-lg transition-colors focus:outline-none focus:ring-4 focus:ring-primary/20" type="submit">
    Log In
  </button>
</form>
