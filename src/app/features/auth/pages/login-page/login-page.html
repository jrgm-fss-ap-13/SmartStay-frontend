<div class="max-w-[440px] w-full mx-auto">
  <!-- Mobile Logo -->
  <div class="lg:hidden flex items-center gap-2 mb-10 text-primary">
    <div class="size-8">
      <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z"
          fill="currentColor"></path>
      </svg>
    </div>
    <span class="text-2xl font-bold tracking-tight text-black">SmartStay</span>
  </div>
  <div class="mb-10">
    <h2 class="text-3xl font-bold text-black mb-2">Welcome back</h2>
    <p class="text-gray-500">Please enter your details to sign in.</p>
  </div>
  <app-login-form 
  [backendErrors]="backendErrors()"
  (login)="onLogin($event)"></app-login-form>
  <div class="mt-8 relative">
    <div aria-hidden="true" class="absolute inset-0 flex items-center">
      <div class="w-full border-t border-gray-200"></div>
    </div>
    <div class="relative flex justify-center text-sm">
      <span class="px-2 bg-white text-gray-500">Or continue with</span>
    </div>
  </div>
  <app-social-buttons></app-social-buttons>
  <p class="mt-10 text-center text-sm text-gray-500">
    Don't have an account?
    <a class="font-semibold text-cyan-500 hover:underline" routerLink="/register">Sign up for free</a>
  </p>
</div>
