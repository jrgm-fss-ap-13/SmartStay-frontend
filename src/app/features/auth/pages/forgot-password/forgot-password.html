<div class="w-full max-w-md">
    <!-- Centered Card -->
    <div class=" bg-white rounded-xl shadow-lg border border-slate-100 p-8 sm:p-10 transition-all">
        <!-- Icon/Visual Header inside card -->
        <div class="mb-6 flex justify-center">
            <div class="h-14 w-14 rounded-full bg-blue-50 flex items-center justify-center">
                <span class="material-symbols-outlined text-3xl text-primary">lock_reset</span>
            </div>
        </div>
        <!-- Text Content -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-3">¿Olvidaste tu contraseña?</h1>
            <p class="text-slate-500 text-sm leading-relaxed">
                Ingresa el correo electrónico asociado a tu cuenta y te enviaremos un enlace para restablecer tu contraseña.
            </p>
        </div>
        <!-- Form -->
        <form action="#" class="space-y-6" method="POST">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2" for="email">
                    Correo electrónico
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <span class="material-symbols-outlined text-[20px]">mail</span>
                    </div>
                    <input
                        class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm"
                        id="email" name="email" placeholder="name@example.com" required="" type="email" />
                </div>
            </div>
            <button
                class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors"
                type="submit">
                Enviar enlace de recuperación
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </form>
        <!-- Back Link -->
        <div class="mt-8 text-center">
            <a class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 hover:text-primary transition-colors group"
                href="#">
                <span
                    class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
                    Volver a iniciar sesión
            </a>
        </div>
    </div>
    <!-- Footer Help Text -->
    <p class="mt-8 text-center text-xs text-slate-400">
        Need help? <a class="font-medium text-primary hover:underline" href="#">Contactar soporte</a>
    </p>
</div>
